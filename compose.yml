# ConnectionWise 本地开发 Docker Compose
# 用法：docker compose up -d
#
# 服务列表：
#   postgres  — 数据库（5432）
#   redis     — Session / 缓存（6379）
#   minio     — 对象存储（9000 / 9001 Console）
#   backend   — NestJS API（3000）
#   frontend  — Nginx + SPA（80 → http://localhost）

services:
  # ---- 基础设施 ----
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: connectwise
      POSTGRES_PASSWORD: connectwise
      POSTGRES_DB: connectwise
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connectwise"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- 应用 ----
  backend:
    build:
      context: ./backend-nest
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      CORS_ORIGIN: http://localhost
      DATABASE_URL: postgresql://connectwise:connectwise@postgres:5432/connectwise?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_SECRET: change-me-to-a-real-secret-at-least-16-chars
      SESSION_NAME: connectwise.sid
      SESSION_TTL_SECONDS: 604800
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: connectionwise
      AI_PROVIDER: openai
      AI_BASE_URL: ${AI_BASE_URL:-http://localhost:11434/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-3.5-turbo}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data:
  minio_data:
